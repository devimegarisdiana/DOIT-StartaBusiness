kind = "web"
previewPath = "/do-it-3d/"
title = "DO IT 3D — Board Game Online"
version = "1.0.0"
id = "artifacts/do-it-3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/do-it-3d/" ]
localPort = 18879

[services.development]
run = "pnpm --filter @workspace/do-it-3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/do-it-3d", "run", "build" ]
publicDir = "artifacts/do-it-3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18879"
BASE_PATH = "/do-it-3d/"
